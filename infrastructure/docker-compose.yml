version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-osint_earth}
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis – caching + pub/sub + worker queues
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO – S3-compatible object storage for tiles, snapshots, exports
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-osint_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /init-minio.sh
    volumes:
      - ./init-minio.sh:/init-minio.sh
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-osint_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}

  # ---------------------------------------------------------------------------
  # Backend API – Node.js / Express
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-osint_earth}
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme_redis_password}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-osint_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio_password}
      API_PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "3001:3001"

  # ---------------------------------------------------------------------------
  # Python ingestion workers
  # ---------------------------------------------------------------------------
  workers:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.workers
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio

  # ---------------------------------------------------------------------------
  # AI / ML processing service
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # Frontend – React + CesiumJS (Vite dev server or Nginx in prod)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
      VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN:-}
    ports:
      - "5173:80"

  # ---------------------------------------------------------------------------
  # Nginx reverse proxy + tile cache
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx

volumes:
  pgdata:
  redisdata:
  miniodata:
  nginx_cache:
